name: Security Scan

# FLYA-30 supply-chain baseline: secret scanning + dependency (CVE) scanning.
# Replicates the flyto-core FLYA-17 pilot. Runs on every push to the default
# branch and on every PR (complete mediation), plus a weekly schedule so newly
# disclosed CVEs in already-pinned deps are caught without a code change.
# Fails closed: a finding fails the job.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 06:17 UTC - offset minute to avoid the top-of-hour runner stampede.
    - cron: '17 6 * * 1'
  workflow_dispatch:

# Least privilege: read-only token; no job here needs write.
permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Scan the whole commit history, not just HEAD, so a secret committed
          # earlier and later "removed" is still surfaced.
          fetch-depth: 0

      - name: Run gitleaks (pinned binary, checksum-verified)
        env:
          # Pin the gitleaks tool itself (not the org-licensed Action) and
          # verify its checksum before executing - supply-chain integrity for
          # our own tooling.
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -sSL --retry 3 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tgz
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          # Scan committed history AND the current working tree. -c pins the
          # repo's allowlist config explicitly; --redact keeps any matched
          # secret out of the public CI log; --exit-code 1 fails closed.
          ./gitleaks git . -c .gitleaks.toml --redact --no-banner --exit-code 1
          ./gitleaks dir . -c .gitleaks.toml --redact --no-banner --exit-code 1

  dependency-scan:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Resolve the package dependency closure and audit for known CVEs
        # No requirements.txt in this repo: resolve the project's declared
        # dependencies into an isolated venv, freeze the exact closure, then
        # audit that closure with pip-audit. This audits precisely the package's
        # runtime dependency tree (incl. transitive) and nothing from the runner
        # image. Fails closed: a known advisory in any resolved package exits 1.
        run: |
          set -euo pipefail
          python -m venv /tmp/auditvenv
          /tmp/auditvenv/bin/pip install --quiet --upgrade pip
          /tmp/auditvenv/bin/pip install --quiet .
          /tmp/auditvenv/bin/pip freeze > /tmp/resolved.txt
          pip install pip-audit==2.7.3
          pip-audit -r /tmp/resolved.txt --progress-spinner=off
