name: Documentation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    uses: flytohub/.github/.github/workflows/reusable-documentation.yml@main

  generated-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install PyYAML==6.0.3
      - run: python3 scripts/generate-reference.py --check
