id: api_fetch_save
name: "Fetch API and Save Response"
description: "Send a GET request to an API endpoint and save the response to a file"
tags: [api, fetch, save, file, json]
connections:
  output_field: "data.result"
args:
  url:
    type: string
    required: true
    description: "API endpoint URL"
  path:
    type: string
    required: true
    description: "Output file path"
steps:
  - id: api_request
    module: http.get
    label: "Send GET request"
    params:
      url: "{{url}}"
  - id: save_response
    module: file.write
    label: "Save response to file"
    params:
      path: "{{path}}"
      content: "${steps.api_request.data.body}"
