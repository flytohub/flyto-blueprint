id: monitor_http
name: "HTTP Health Check"
description: "Check if a website or API endpoint is up and responding"
tags: [monitor, http, health, uptime, check, get]
connections:
  output_field: "data.body"
args:
  url:
    type: string
    required: true
    description: "URL to check"
steps:
  - id: health_check
    module: http.get
    label: "Check HTTP health"
    params:
      url: "{{url}}"
