id: foreach_loop
name: "Loop Over Items"
description: "Iterate over a list of items — wire items from previous step, next step processes each item"
tags: [loop, foreach, iterate, list, flow]
connections:
  output_field: "data.result"
args:
  items:
    type: string
    required: true
    description: "Variable reference to the list to iterate (e.g. ${steps.prev.data.result})"
steps:
  - id: loop
    module: flow.foreach
    label: "Loop over items"
    params:
      items: "{{items}}"
