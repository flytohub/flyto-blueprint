id: http_post
name: "HTTP POST Request"
description: "Send data to a URL via HTTP POST"
tags: [http, post, request, api, webhook]
connections:
  output_field: "data.body"
args:
  url:
    type: string
    required: true
    description: "URL to send data to"
  body:
    type: object
    required: true
    description: "JSON request body"
  headers:
    type: object
    required: false
    description: "Request headers"
steps:
  - id: http_request
    module: http.request
    label: "Send POST request"
    params:
      url: "{{url}}"
      method: "POST"
      body: "{{body}}"
      headers: "{{headers}}"
