id: file_download
name: "Download File"
description: "Download a file from a URL and save it locally"
tags: [file, download, http, save]
connections:
  output_field: "data.result"
args:
  url:
    type: string
    required: true
    description: "URL of the file to download"
  path:
    type: string
    required: true
    description: "Output file path"
steps:
  - id: fetch
    module: http.get
    label: "Fetch file"
    params:
      url: "{{url}}"
  - id: save
    module: file.write
    label: "Save file"
    params:
      path: "{{path}}"
      content: "${steps.fetch.data.body}"
