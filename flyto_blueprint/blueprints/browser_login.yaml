id: browser_login
name: "Login to Website"
description: "Open a website and log in with credentials using the login module"
tags: [browser, login, auth, credentials]
compose: [browser_init]
args:
  url:
    type: string
    required: true
    description: "Login page URL"
  username:
    type: string
    required: true
    description: "Username or email"
  password:
    type: string
    required: true
    description: "Password"
  username_selector:
    type: string
    required: false
    description: "CSS selector for username field (auto-detected if omitted)"
  password_selector:
    type: string
    required: false
    description: "CSS selector for password field (auto-detected if omitted)"
  submit_selector:
    type: string
    required: false
    description: "CSS selector for login button (auto-detected if omitted)"
steps:
  - id: login
    module: browser.login
    label: "Log in"
    params:
      username: "{{username}}"
      password: "{{password}}"
      username_selector: "{{username_selector}}"
      password_selector: "{{password_selector}}"
      submit_selector: "{{submit_selector}}"
