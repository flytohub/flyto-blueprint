id: json_transform
name: "Template Text"
description: "Render a text template with variable substitution"
tags: [template, text, string, render, transform, json]
connections:
  output_field: "data.result"
args:
  template:
    type: string
    required: true
    description: "Template string with placeholders"
steps:
  - id: render_template
    module: string.template
    label: "Render template"
    params:
      template: "{{template}}"
      variables: {}
