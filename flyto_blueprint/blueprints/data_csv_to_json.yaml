id: data_csv_to_json
name: "Convert CSV to JSON"
description: "Read a CSV file and convert it to JSON format"
tags: [data, csv, json, convert, transform]
args:
  input:
    type: string
    required: true
    description: "Input CSV file path"
  output:
    type: string
    required: true
    description: "Output JSON file path"
steps:
  - id: read_csv
    module: data.csv.read
    label: "Read CSV file"
    params:
      file_path: "{{input}}"
  - id: convert_to_json
    module: data.json.stringify
    label: "Convert to JSON"
    params:
      data: "${steps.read_csv.data.content}"
  - id: save_json
    module: file.write
    label: "Save JSON file"
    params:
      path: "{{output}}"
      content: "${steps.convert_to_json.data.result}"
